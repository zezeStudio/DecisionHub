    <script>
        const translations = {
            "ko": {
                "meta_title": "팀 의사결정 전략 - Zeze Hub Insight",
                "category": "비즈니스/협업 칼럼",
                "main_title": "팀을 위한 최고의 의사결정 전략: 갈등 없이 결론 내는 법",
                "date_info": "작성일: 2024년 11월 07일 · 읽는 시간: 약 6분",
                "back_home": "허브로 돌아가기",
                "body": `
                    <p>혼자 하는 결정도 힘들지만, 여러 사람이 모여 하나의 결론을 내는 것은 훨씬 더 어렵습니다. 각자의 이해관계와 가치관이 충돌하기 때문입니다. 하지만 효율적인 팀은 '다수결' 이상의 전략을 사용합니다.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">1. 다수결의 함정을 경계하라</h2>
                    <p>가장 흔히 쓰이는 다수결은 빠르지만 위험합니다. 소수의 의견이 완전히 무시되어 팀의 결속력을 해칠 수 있고, '집단 사고(Groupthink)'에 빠져 잘못된 길로 갈 수도 있습니다. 중요한 사안일수록 '동의(Consensus)' 과정을 거쳐야 합니다.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">2. 피스트 투 파이브 (Fist to Five) 기법</h2>
                    <p>팀원들의 찬성 정도를 0(주먹)부터 5(다섯 손가락)까지 표시하게 하세요. 단순히 찬반을 나누는 것이 아니라, 의견의 강도를 확인함으로써 잠재적인 불만을 미리 파악할 수 있습니다.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">3. 무작위 할당의 심리학적 가치</h2>
                    <p>업무 배분이나 순번 정하기처럼 감정 소모가 심한 결정에서는 오히려 <strong>'무작위 추첨'</strong>이 가장 강력한 공정성을 발휘합니다. 인간의 주관이 개입되지 않았다는 사실만으로도 팀원들은 결과에 승복하기 쉬워집니다.</p>
                    <p>Zeze Hub의 <a href="../teammaker/teammaker.html" class="text-primary font-bold">팀 메이커</a>나 <a href="../ladderclimb/ladderclimb.html" class="text-primary font-bold">사다리 타기</a>는 이러한 팀 내 갈등을 원천 봉쇄하는 훌륭한 중재자 역할을 합니다.</p>
                `
            },
            "en": {
                "meta_title": "Best Decision Strategies for Teams - Zeze Hub Insight",
                "category": "Business/Collaboration Column",
                "main_title": "Best Decision-Making Strategies for Teams:<br>How to Reach a Conclusion Without Conflict",
                "date_info": "Published: Nov 7, 2024 · Read time: Approx. 6 min",
                "back_home": "Back to Hub",
                "body": `
                    <p>Deciding alone is hard, but reaching a consensus in a group is even tougher. Conflicting interests and values make it complex. However, high-performing teams use strategies beyond simple majority rule.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">1. Beware the Trap of Majority Rule</h2>
                    <p>While fast, majority rule can be dangerous. It can alienate the minority and lead to 'Groupthink,' where the team follows a flawed path just to maintain harmony. For critical issues, aim for consensus.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">2. The 'Fist to Five' Technique</h2>
                    <p>Ask team members to show their level of agreement using 0 (fist) to 5 (five fingers). This reveals the intensity of opinions and helps identify potential dissatisfaction early on.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">3. The Psychological Value of Random Allocation</h2>
                    <p>For emotionally charged decisions like task assignments or order of turns, <strong>'Random Selection'</strong> is often the fairest method. The fact that no human bias was involved makes it much easier for members to accept the outcome.</p>
                    <p>Zeze Hub's <a href="../teammaker/teammaker.html" class="text-primary font-bold">Team Maker</a> and <a href="../ladderclimb/ladderclimb.html" class="text-primary font-bold">Ladder Climb</a> act as perfect mediators to prevent such conflicts at their source.</p>
                `
            }
        };
        let currentLang = localStorage.getItem('lang') || 'ko';
        function applyLanguage() {
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.dataset.key;
                if (translations[currentLang][key]) el.innerHTML = translations[currentLang][key];
            });
            document.getElementById('article-body').innerHTML = translations[currentLang].body;
            document.documentElement.lang = currentLang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                const btnLang = btn.id.split('-')[1];
                if (btnLang === currentLang) {
                    btn.classList.add('bg-primary', 'text-white', 'border-primary');
                    btn.classList.remove('bg-transparent', 'text-gray-600', 'border-gray-200');
                } else {
                    btn.classList.remove('bg-primary', 'text-white', 'border-primary');
                    btn.classList.add('bg-transparent', 'text-gray-600', 'border-gray-200');
                }
            });
        }
        function setLanguage(lang) { currentLang = lang; localStorage.setItem('lang', lang); applyLanguage(); }
        document.addEventListener('DOMContentLoaded', applyLanguage);
    </script>
