                    <p>학교나 직장에서 팀을 짤 때, 주관적인 판단이 개입되면 갈등이 생기기 마련입니다. "친한 사람끼리만 모였다"거나 "잘하는 사람이 한쪽에 쏠렸다"는 불만이 나오기 때문입니다.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">1. 절차적 공정성 (Procedural Justice)</h2>
                    <p>사람들은 결과가 자신에게 불리하더라도, 그 과정(절차)이 공정했다면 결과를 기꺼이 수용합니다. 무작위 추첨은 모든 사람에게 동일한 확률을 부여하므로, 심리학적으로 가장 완벽한 절차적 공정성을 제공합니다.</p>

                    <p>무작위로 팀을 구성하면 우리가 평소에 대화해보지 않았던 사람들과 협력할 기회가 생깁니다. 이는 집단의 창의성을 높이고 편견을 허무는 데 큰 도움이 됩니다.</p>

                `
            },

                "meta_title": "The Science of Fair Grouping - Zeze Hub Insight",
                "category": "Social Psychology Column",
                "main_title": "The Science of Fair Grouping:<br>Why Random Selection?",
                "date_info": "Published: Oct 29, 2024 · Read time: Approx. 6 min",
                "back_home": "Back to Hub",
                "body": `
                    <p>When forming teams at school or work, subjective judgment often leads to conflict. Complaints like "they only picked their friends" or "one side is too strong" are common.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">1. Procedural Justice</h2>
                    <p>People are willing to accept outcomes, even if unfavorable, as long as the process (procedure) was fair. Random selection gives everyone an equal probability, providing the most perfect psychological procedural justice.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">2. Ensuring Diversity</h2>
                    <p>Random grouping creates opportunities to collaborate with people we might not normally talk to. This enhances group creativity and helps break down biases within an organization.</p>

                `

        let currentLang = localStorage.getItem('lang') || 'ko';

                if (translations[currentLang][key]) el.innerHTML = translations[currentLang][key];
            });
            document.getElementById('article-body').innerHTML = translations[currentLang].body;
            document.documentElement.lang = currentLang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                const btnLang = btn.id.split('-')[1];
                if (btnLang === currentLang) {
                    btn.classList.add('bg-primary', 'text-white', 'border-primary');
                    btn.classList.remove('bg-transparent', 'text-gray-600', 'border-gray-200');
                } else {
                    btn.classList.remove('bg-primary', 'text-white', 'border-primary');
                    btn.classList.add('bg-transparent', 'text-gray-600', 'border-gray-200');
                }
            });
        }
        function setLanguage(lang) { currentLang = lang; localStorage.setItem('lang', lang); applyLanguage(); }
        document.addEventListener('DOMContentLoaded', applyLanguage);
