    <script>
        const translations = {
            "ko": {
                "meta_title": "복불복의 역사 - Zeze Hub Insight",
                "category": "역사 칼럼",
                "main_title": "복불복의 역사: 고대부터 현대까지",
                "date_info": "작성일: 2024년 11월 17일 · 읽는 시간: 약 6분",
                "back_home": "허브로 돌아가기",
                "body": `
                    <p>복불복은 단순히 운을 시험하는 게임이 아닙니다. 인류 역사에서 공정성을 지키기 위한 가장 오래된 기술 중 하나입니다.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">1. 고대 그리스의 제비뽑기 민주주의</h2>
                    <p>민주주의의 발상지인 아테네에서는 공직자를 투표가 아닌 '제비뽑기'로 정했습니다. 이는 돈과 권력을 가진 사람이 정치에 개입하는 것을 막기 위한 완벽한 평등의 실현이었습니다.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">2. 전쟁과 평화의 결정</h2>
                    <p>역사적으로 영토 분쟁이나 왕위 계승에서도 무작위 추첨이 쓰였습니다. 인간의 주관이 닿지 않는 곳에 결정을 맡김으로써 불필요한 전쟁을 막기도 했습니다.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">오늘날의 복불복</h2>
                    <p>Zeze Hub는 이러한 역사적 유산을 현대적인 알고리즘으로 계승합니다. 복잡한 고민 앞에서 고대의 지혜를 빌려보세요.</p>
                `
            },
            "en": {
                "meta_title": "History of Games of Chance - Zeze Hub Insight",
                "category": "History Column",
                "main_title": "History of Games of Chance:<br>From Ancient Times to Now",
                "date_info": "Published: Nov 17, 2024 · Read time: Approx. 6 min",
                "back_home": "Back to Hub",
                "body": `
                    <p>Games of chance are not just about luck. They are one of the oldest technologies in human history for maintaining fairness.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">1. Athenian Democracy and Selection by Lot</h2>
                    <p>In Athens, the birthplace of democracy, public officials were selected by lot. This was a realization of perfect equality, preventing those with money and power from dominating politics.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">2. Decisions of War and Peace</h2>
                    <p>Historically, random draws were used in land disputes or royal successions. Leaving decisions to forces beyond human control often prevented unnecessary wars.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">Modern Randomness</h2>
                    <p>Zeze Hub inherits this historical legacy with modern algorithms. Borrow the wisdom of antiquity when faced with complex decisions.</p>
                `
            }
        };
        let currentLang = localStorage.getItem('lang') || 'ko';
        function applyLanguage() {
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.dataset.key;
                if (translations[currentLang][key]) el.innerHTML = translations[currentLang][key];
            });
            document.getElementById('article-body').innerHTML = translations[currentLang].body;
            document.documentElement.lang = currentLang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                const btnLang = btn.id.split('-')[1];
                if (btnLang === currentLang) {
                    btn.classList.add('bg-primary', 'text-white', 'border-primary');
                    btn.classList.remove('bg-transparent', 'text-gray-600', 'border-gray-200');
                } else {
                    btn.classList.remove('bg-primary', 'text-white', 'border-primary');
                    btn.classList.add('bg-transparent', 'text-gray-600', 'border-gray-200');
                }
            });
        }
        function setLanguage(lang) { currentLang = lang; localStorage.setItem('lang', lang); applyLanguage(); }
        document.addEventListener('DOMContentLoaded', applyLanguage);
    </script>
</body>
</html>
