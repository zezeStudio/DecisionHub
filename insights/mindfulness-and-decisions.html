        const translations = {

                "body": `
                    <p>결정을 내릴 때 우리는 종종 과거의 실패를 후회하거나 미래의 불확실성을 걱정합니다. 하지만 진정으로 현명한 결정은 '지금 이 순간'에 온전히 깨어있을 때 가능합니다. 이것이 바로 <strong>마음챙김(Mindfulness)</strong> 의사결정입니다.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">1. 감정적 폭풍 가라앉히기</h2>
                    <p>불안이나 분노 상태에서 내린 결정은 나중에 후회할 가능성이 매우 높습니다. 마음챙김은 강렬한 감정과 나 사이에 거리를 두게 하여, 객관적인 관점에서 상황을 바라볼 수 있게 돕습니다.</p>

                    <p>즉각적인 반응 대신 3초간 숨을 들이마시고 내쉬는 것만으로도 뇌의 전전두엽이 활성화됩니다. 이 짧은 멈춤이 충동적인 선택을 막고 더 나은 길을 보여줍니다.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">Zeze Hub: 비우기를 통한 채우기</h2>
                    <p>머릿속이 너무 복잡해 아무것도 결정할 수 없다면, 잠시 명상을 하고 <a href="../magiclamp/magiclamp.html" class="text-primary font-bold">요술 램프</a>의 무작위 결과를 받아들여 보세요. 그것이 정답이라서가 아니라, 당신의 뇌가 잠시 휴식하고 본능적인 직관에 집중할 시간을 주기 위해서입니다.</p>
                `
            },
            "en": {
                "meta_title": "Mindfulness and Choice - Zeze Hub Insight",
                "category": "Mental Health Column",

                "date_info": "Published: Nov 12, 2024 · Read time: Approx. 6 min",
                "back_home": "Back to Hub",
                "body": `
                    <p>When making decisions, we often regret past failures or worry about future uncertainties. However, truly wise decisions are possible only when we are fully present in 'this moment.' This is <strong>Mindfulness Decision-Making</strong>.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">1. Calming the Emotional Storm</h2>
                    <p>Decisions made under anxiety or anger are highly likely to be regretted. Mindfulness helps distance you from intense emotions, allowing you to view the situation from an objective perspective.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">2. The Power of the 'Pause'</h2>
                    <p>Simply taking a 3-second breath before reacting activates the prefrontal cortex. This short pause prevents impulsive choices and reveals a better path.</p>
                    <h2 class="text-2xl font-bold text-gray-900 mt-10 mb-4 border-b pb-2">Zeze Hub: Filling by Emptying</h2>
                    <p>If your mind is too cluttered to decide, try a brief meditation and then accept a random result from the <a href="../magiclamp/magiclamp.html" class="text-primary font-bold">Magic Lamp</a>. Not because it's the "answer," but to give your brain a rest and a chance to focus on your instinctive intuition.</p>
                `
            }
        };
        let currentLang = localStorage.getItem('lang') || 'ko';
        function applyLanguage() {
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.dataset.key;
                if (translations[currentLang][key]) el.innerHTML = translations[currentLang][key];
            });
            document.getElementById('article-body').innerHTML = translations[currentLang].body;
            document.documentElement.lang = currentLang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                const btnLang = btn.id.split('-')[1];
                if (btnLang === currentLang) {
                    btn.classList.add('bg-primary', 'text-white', 'border-primary');
                    btn.classList.remove('bg-transparent', 'text-gray-600', 'border-gray-200');
                } else {
                    btn.classList.remove('bg-primary', 'text-white', 'border-primary');
                    btn.classList.add('bg-transparent', 'text-gray-600', 'border-gray-200');
                }
            });
        }
        function setLanguage(lang) { currentLang = lang; localStorage.setItem('lang', lang); applyLanguage(); }
        document.addEventListener('DOMContentLoaded', applyLanguage);
    </script>
